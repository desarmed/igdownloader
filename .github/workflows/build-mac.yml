name: build-mac
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Baixar binários do macOS
        run: |
          mkdir -p bin/mac
          # gallery-dl: releases "latest" às vezes são source-only (sem binário);
          # pinado na última release que publica binários.
          curl -L -o bin/mac/gallery-dl.bin https://github.com/mikf/gallery-dl/releases/download/v1.31.10/gallery-dl.bin
          curl -L -o bin/mac/yt-dlp_macos https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          chmod +x bin/mac/gallery-dl.bin bin/mac/yt-dlp_macos
      - name: Baixar ffmpeg/ffprobe (macOS)
        run: |
          curl -L -o /tmp/ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          curl -L -o /tmp/ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o /tmp/ffmpeg.zip -d bin/mac
          unzip -o /tmp/ffprobe.zip -d bin/mac
          chmod +x bin/mac/ffmpeg bin/mac/ffprobe
      - name: Instalar PyInstaller + customtkinter
        run: pip install "pyinstaller>=6.10,<7" "customtkinter>=5.2,<6"
      - name: Build do .app
        run: |
          pyinstaller --windowed --name "IG-Baixador" \
            --add-data "bin/mac:bin/mac" \
            --collect-data customtkinter \
            --paths src \
            src/ig_baixador/__main__.py
      - name: Empacotar em .dmg
        run: |
          hdiutil create -volname "IG-Baixador" -srcfolder "dist/IG-Baixador.app" \
            -ov -format UDZO "dist/IG-Baixador.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: IG-Baixador-mac
          path: dist/IG-Baixador.dmg
